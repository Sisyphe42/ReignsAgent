<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/logo-alpha.png" />
  <title>ReignsAgent Player</title>
  <link rel="stylesheet" href="/assets/dashboard.css" />
  <style>
    .topbar__controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }
    .skin-select {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .skin-select select {
      min-width: 124px;
    }
    .stage {
      max-width: 460px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .player-card {
      background: linear-gradient(160deg, var(--panel), color-mix(in srgb, var(--panel) 78%, black 22%));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }
    :root[data-skin="famicom"] .player-card {
      background: linear-gradient(160deg, #fff8e8, #efe4cc);
      box-shadow: 4px 4px 0 rgba(36, 33, 29, 0.18);
    }
    :root[data-skin="phantom"] .player-card {
      background: linear-gradient(160deg, #f4f0e8, #e7ded0);
      color: #09090a;
      border-width: 2px;
      box-shadow: 8px 8px 0 rgba(215, 25, 32, 0.18);
    }
    :root[data-skin="terminal"] .player-card {
      background: linear-gradient(160deg, #13251b, #0d1712);
    }
    .player-art {
      width: min(160px, 48%);
      aspect-ratio: 1;
      align-self: center;
      object-fit: contain;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 18px;
    }
    .player-text { font-size: 19px; line-height: 1.5; }
    .player-swipes { display: flex; gap: 12px; margin-top: 24px; }
    .start-wrap { text-align: center; margin-top: 32px; display: flex; gap: 10px; justify-content: center; }
    .session-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .swipe-hint { font-size: 11px; color: var(--muted); text-align: center; margin: 12px 0 0; }
    .player-card { transition: transform 0.18s ease-out; touch-action: pan-y; user-select: none; }
    .player-card.swiping { transition: none; cursor: grabbing; }
    .player-card[data-swipe-hint="left"] { box-shadow: -6px 12px 30px rgba(217,106,106,0.35); }
    .player-card[data-swipe-hint="right"] { box-shadow: 6px 12px 30px rgba(106,217,143,0.35); }
    .summary { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 16px; }
    .summary__title { font-size: 14px; font-weight: 600; margin: 0 0 6px; }
    .summary__line { font-size: 12px; color: var(--muted); margin: 2px 0; }
    @media (prefers-reduced-motion: reduce) { .player-card { transition: none; } }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand__mark" aria-hidden="true">
        <img src="/assets/logo-alpha.png" alt="" />
      </span>
      <div>
        <h1>ReignsAgent Player</h1>
        <p class="brand__tag">Preview</p>
      </div>
    </div>
    <div class="topbar__controls">
      <label class="skin-select">
        Skin
        <select id="skin">
          <option value="github-light">Github Light</option>
          <option value="catppuccin-latte">Catppuccin Latte</option>
          <option value="classic">Classic</option>
          <option value="famicom">Famicom</option>
          <option value="phantom">Phantom</option>
          <option value="arcade">Arcade</option>
          <option value="terminal">Terminal</option>
        </select>
      </label>
      <nav class="topbar__nav">
        <a id="back-link" href="/workbench">Back to workbench</a>
      </nav>
    </div>
  </header>

  <main class="stage">
    <div class="gauges" id="gauges"></div>
    <div class="player-card" id="card" role="group" aria-label="Current card">
      <img id="art" class="player-art" alt="" hidden />
      <p class="player-text" id="text" aria-live="polite">The court is waiting.</p>
      <div class="player-swipes">
        <button id="left" class="btn btn--choice" disabled aria-label="Swipe left">◀ Left</button>
        <button id="right" class="btn btn--choice" disabled aria-label="Swipe right">Right ▶</button>
      </div>
      <p class="swipe-hint" id="swipe-hint" hidden>Drag the card or use ← → keys</p>
    </div>
    <div class="summary" id="summary" hidden aria-live="polite"></div>
    <div class="start-wrap">
      <button id="start" class="btn btn--primary">Start reign</button>
      <button id="restart" class="btn" hidden>Restart reign</button>
    </div>
    <div class="session-meta">
      <span id="turn-label">Turn 0</span>
      <span id="session-label">No active reign</span>
    </div>
    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>

  <script type="module">
    import { attachSwipe } from "/assets/swipe-input.js";

    const api = async (path, body, method = "POST") => {
      const res = await fetch(path, {
        method,
        headers: { "content-type": "application/json" },
        body: body !== undefined ? JSON.stringify(body) : undefined
      });
      const text = await res.text();
      const json = text ? JSON.parse(text) : null;
      if (!res.ok || json?.error) throw new Error(json?.error?.message ?? `Request failed: ${res.status}`);
      return json;
    };
    const el = (id) => document.getElementById(id);
    const setStatus = (msg, kind = "") => { el("status").textContent = msg; el("status").className = `status ${kind ? `status--${kind}` : ""}`; };
    const escapeHtml = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const PERSIST_KEY = "reigns-agent.creator-web.skin";
    const DEFAULT_SKIN = "github-light";
    const KNOWN_SKINS = new Set(["github-light", "catppuccin-latte", "classic", "famicom", "phantom", "arcade", "terminal"]);
    const SKIN_ALIASES = { workbench: "classic" };
    const params = new URLSearchParams(window.location.search);
    const requestedLocale = params.get("locale") || navigator.language || "en";
    const requestedClient = params.get("client") === "desktop" ? "desktop" : null;
    const requestedSkin = params.get("skin");

    let session = null;
    let assetByCard = new Map();
    let lastResult = null;
    let awaitingRestartConfirm = false;

    function resolveSkinId(value) {
      const skin = SKIN_ALIASES[value] ?? value;
      return KNOWN_SKINS.has(skin) ? skin : null;
    }

    function resolveSkin() {
      const requested = resolveSkinId(requestedSkin);
      if (requested) return requested;
      return DEFAULT_SKIN;
    }

    function applySkin(nextSkin, mode = "replace") {
      const skin = resolveSkinId(nextSkin) ?? DEFAULT_SKIN;
      document.documentElement.dataset.skin = skin;
      localStorage.setItem(PERSIST_KEY, skin);
      el("skin").value = skin;
      const url = new URL(window.location.href);
      url.searchParams.set("skin", skin);
      window.history[mode === "push" ? "pushState" : "replaceState"](null, "", `${url.pathname}${url.search}${url.hash}`);

      const backUrl = new URL("/workbench", window.location.origin);
      backUrl.searchParams.set("skin", skin);
      backUrl.searchParams.set("locale", requestedLocale);
      if (requestedClient) backUrl.searchParams.set("client", requestedClient);
      el("back-link").href = `${backUrl.pathname}${backUrl.search}`;
    }

    applySkin(resolveSkin());
    el("skin").addEventListener("change", (event) => applySkin(event.target.value));

    function canSwipe() {
      return Boolean(session) && !lastResult?.gameOver && lastResult?.currentCard;
    }

    attachSwipe({
      element: el("card"),
      onSwipe: (direction) => swipe(direction),
      canSwipe
    });

    function updateSessionMeta(state) {
      const turn = state?.turn ?? 0;
      el("turn-label").textContent = `Turn ${turn}`;
      el("session-label").textContent = session ? `Session ${session}` : "No active reign";
    }

    function updateActionButtons(state) {
      const running = Boolean(session) && !state?.gameOver;
      el("start").textContent = running ? "Reign running" : "Start reign";
      el("start").disabled = running;
      el("restart").hidden = !session;
      el("restart").textContent = awaitingRestartConfirm ? "Confirm restart" : "Restart reign";
    }

    function render(state) {
      lastResult = state;
      updateSessionMeta(state);
      updateActionButtons(state);
      const gauges = el("gauges");
      gauges.innerHTML = "";
      for (const [name, gauge] of Object.entries(state.gauges ?? {})) {
        const div = document.createElement("div");
        const label = gauge.label || name;
        const description = gauge.description ? `<div class="gauge__desc">${escapeHtml(gauge.description)}</div>` : "";
        div.className = "gauge";
        div.innerHTML = `<div class="gauge__name">${escapeHtml(label)} · ${gauge.value}</div>${description}<div class="gauge__bar"><div class="gauge__fill" style="width:${gauge.left}%"></div></div>`;
        gauges.appendChild(div);
      }
      el("swipe-hint").hidden = !state.currentCard || state.gameOver;
      if (state.currentCard) {
        const asset = assetByCard.get(state.currentCard.id);
        if (asset) {
          el("art").src = asset.uri;
          el("art").hidden = false;
        } else {
          el("art").removeAttribute("src");
          el("art").hidden = true;
        }
        el("text").textContent = state.currentCard.text ?? state.currentCard.id;
        setChoiceButtonLabels(state.currentCard);
        el("left").disabled = false;
        el("right").disabled = false;
        el("summary").hidden = true;
      } else {
        el("art").removeAttribute("src");
        el("art").hidden = true;
        el("text").textContent = state.gameOver ? "Your reign has ended." : "No card available.";
        resetChoiceButtonLabels();
        el("left").disabled = true;
        el("right").disabled = true;
        if (state.gameOver) {
          renderSummary(state);
        }
      }
    }

    function renderSummary(state) {
      const summary = el("summary");
      const faction = state.gameOver?.faction ?? "—";
      const lines = Object.entries(state.factions ?? {})
        .map(([name, value]) => `<div class="summary__line">${escapeHtml(name)}: ${value}</div>`)
        .join("");
      summary.innerHTML = `
        <p class="summary__title">Reign ended · ${escapeHtml(faction)}</p>
        <div class="summary__line">Turns survived: ${state.turn ?? 0}</div>
        ${lines}
      `;
      summary.hidden = false;
    }

    async function startReign() {
      try {
        const editor = await api("/api/editor", undefined, "GET");
        assetByCard = createAssetMap(editor.assets ?? []);
        applyPresentation(editor.metadata?.presentation);
        const result = await api("/api/play/start", { locale: requestedLocale });
        if (result.error) throw new Error(result.error.message);
        session = result.sessionId;
        awaitingRestartConfirm = false;
        render(result);
        setStatus("Reign started", "ok");
      } catch (error) {
        setStatus(error.message, "err");
      }
    }

    el("start").addEventListener("click", startReign);
    el("restart").addEventListener("click", async () => {
      if (!session) {
        await startReign();
        return;
      }
      if (!awaitingRestartConfirm) {
        awaitingRestartConfirm = true;
        updateActionButtons(lastResult);
        setStatus("Click restart again to confirm", "err");
        return;
      }
      await startReign();
    });

    async function swipe(direction) {
      if (!canSwipe()) return;
      try {
        awaitingRestartConfirm = false;
        const result = await api("/api/play/swipe", { sessionId: session, direction });
        render(result);
        if (result.gameOver) setStatus(`Game over: ${result.gameOver.faction}`, "err");
      } catch (error) {
        setStatus(error.message, "err");
      }
    }
    el("left").addEventListener("click", () => swipe("left"));
    el("right").addEventListener("click", () => swipe("right"));

    function setChoiceButtonLabels(card) {
      const left = card.choices?.find((choice) => choice.id === "left");
      const right = card.choices?.find((choice) => choice.id === "right");
      el("left").textContent = `◀ ${left?.label ?? "Left"}`;
      el("right").textContent = `${right?.label ?? "Right"} ▶`;
    }

    function resetChoiceButtonLabels() {
      el("left").textContent = "◀ Left";
      el("right").textContent = "Right ▶";
    }

    function applyPresentation(presentation = {}) {
      const variables = presentation?.css?.variables ?? {};
      const blockedVariables = new Set([
        "--bg",
        "--panel",
        "--panel-2",
        "--ink",
        "--muted",
        "--accent",
        "--accent-2",
        "--danger",
        "--ok",
        "--border",
        "--radius"
      ]);
      for (const [name, value] of Object.entries(variables)) {
        if (name.startsWith("--") && !blockedVariables.has(name)) {
          document.documentElement.style.setProperty(name, String(value));
        }
      }

      let style = document.getElementById("presentation-css");
      if (!style) {
        style = document.createElement("style");
        style.id = "presentation-css";
        document.head.appendChild(style);
      }
      style.textContent = presentation?.policy?.allowCssText === true ? (presentation?.css?.text ?? "") : "";
    }

    function createAssetMap(assets) {
      const map = new Map();
      for (const asset of assets) {
        if (asset?.cardId && asset?.uri && !map.has(asset.cardId)) {
          map.set(asset.cardId, asset);
        }
      }
      return map;
    }

    updateSessionMeta(null);
    updateActionButtons(null);
  </script>
</body>
</html>
