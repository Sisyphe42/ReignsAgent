<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReignsAgent Player</title>
  <link rel="stylesheet" href="/assets/dashboard.css" />
  <style>
    .stage {
      max-width: 460px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .player-card {
      background: linear-gradient(160deg, #262b36, #181b22);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }
    .player-art {
      width: min(160px, 48%);
      aspect-ratio: 1;
      align-self: center;
      object-fit: contain;
      background: #0c0e12;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 18px;
    }
    .player-text { font-size: 19px; line-height: 1.5; }
    .player-swipes { display: flex; gap: 12px; margin-top: 24px; }
    .start-wrap { text-align: center; margin-top: 32px; display: flex; gap: 10px; justify-content: center; }
    .swipe-hint { font-size: 11px; color: #8a8f99; text-align: center; margin: 12px 0 0; }
    .player-card { transition: transform 0.18s ease-out; touch-action: pan-y; user-select: none; }
    .player-card.swiping { transition: none; cursor: grabbing; }
    .player-card[data-swipe-hint="left"] { box-shadow: -6px 12px 30px rgba(217,106,106,0.35); }
    .player-card[data-swipe-hint="right"] { box-shadow: 6px 12px 30px rgba(106,217,143,0.35); }
    .summary { background: #1f232c; border: 1px solid #2a2f3a; border-radius: 8px; padding: 14px; margin-top: 16px; }
    .summary__title { font-size: 14px; font-weight: 600; margin: 0 0 6px; }
    .summary__line { font-size: 12px; color: #8a8f99; margin: 2px 0; }
    @media (prefers-reduced-motion: reduce) { .player-card { transition: none; } }
    button:focus-visible { outline: 2px solid #c9a24b; outline-offset: 2px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand__mark">RA</span>
      <div>
        <h1>ReignsAgent Player</h1>
        <p class="brand__tag">Preview</p>
      </div>
    </div>
    <nav class="topbar__nav">
      <a href="/">Back to dashboard</a>
    </nav>
  </header>

  <main class="stage">
    <div class="gauges" id="gauges"></div>
    <div class="player-card" id="card" role="group" aria-label="Current card">
      <img id="art" class="player-art" alt="" hidden />
      <p class="player-text" id="text" aria-live="polite">The court is waiting.</p>
      <div class="player-swipes">
        <button id="left" class="btn btn--choice" disabled aria-label="Swipe left">◀ Left</button>
        <button id="right" class="btn btn--choice" disabled aria-label="Swipe right">Right ▶</button>
      </div>
      <p class="swipe-hint" id="swipe-hint" hidden>Drag the card or use ← → keys</p>
    </div>
    <div class="summary" id="summary" hidden aria-live="polite"></div>
    <div class="start-wrap">
      <button id="start" class="btn btn--primary">Start reign</button>
      <button id="restart" class="btn" hidden>Play again</button>
    </div>
    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>

  <script type="module">
    import { attachSwipe } from "/assets/swipe-input.js";

    const api = async (path, body, method = "POST") => {
      const res = await fetch(path, {
        method,
        headers: { "content-type": "application/json" },
        body: body !== undefined ? JSON.stringify(body) : undefined
      });
      const text = await res.text();
      const json = text ? JSON.parse(text) : null;
      if (!res.ok || json?.error) throw new Error(json?.error?.message ?? `Request failed: ${res.status}`);
      return json;
    };
    const el = (id) => document.getElementById(id);
    const setStatus = (msg, kind = "") => { el("status").textContent = msg; el("status").className = `status ${kind ? `status--${kind}` : ""}`; };
    const escapeHtml = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const requestedLocale = new URLSearchParams(window.location.search).get("locale") || navigator.language || "en";

    let session = null;
    let assetByCard = new Map();
    let lastResult = null;

    function canSwipe() {
      return Boolean(session) && !lastResult?.gameOver && lastResult?.currentCard;
    }

    attachSwipe({
      element: el("card"),
      onSwipe: (direction) => swipe(direction),
      canSwipe
    });

    function render(state) {
      lastResult = state;
      const gauges = el("gauges");
      gauges.innerHTML = "";
      for (const [name, gauge] of Object.entries(state.gauges ?? {})) {
        const div = document.createElement("div");
        div.className = "gauge";
        div.innerHTML = `<div class="gauge__name">${escapeHtml(name)} · ${gauge.value}</div><div class="gauge__bar"><div class="gauge__fill" style="width:${gauge.left}%"></div></div>`;
        gauges.appendChild(div);
      }
      el("swipe-hint").hidden = !state.currentCard || state.gameOver;
      if (state.currentCard) {
        const asset = assetByCard.get(state.currentCard.id);
        if (asset) {
          el("art").src = asset.uri;
          el("art").hidden = false;
        } else {
          el("art").removeAttribute("src");
          el("art").hidden = true;
        }
        el("text").textContent = state.currentCard.text ?? state.currentCard.id;
        setChoiceButtonLabels(state.currentCard);
        el("left").disabled = false;
        el("right").disabled = false;
        el("summary").hidden = true;
        el("restart").hidden = true;
      } else {
        el("art").removeAttribute("src");
        el("art").hidden = true;
        el("text").textContent = state.gameOver ? "Your reign has ended." : "No card available.";
        resetChoiceButtonLabels();
        el("left").disabled = true;
        el("right").disabled = true;
        if (state.gameOver) {
          renderSummary(state);
          el("restart").hidden = false;
        }
      }
    }

    function renderSummary(state) {
      const summary = el("summary");
      const faction = state.gameOver?.faction ?? "—";
      const lines = Object.entries(state.factions ?? {})
        .map(([name, value]) => `<div class="summary__line">${escapeHtml(name)}: ${value}</div>`)
        .join("");
      summary.innerHTML = `
        <p class="summary__title">Reign ended · ${escapeHtml(faction)}</p>
        <div class="summary__line">Turns survived: ${state.turn ?? 0}</div>
        ${lines}
      `;
      summary.hidden = false;
    }

    async function startReign() {
      try {
        const editor = await api("/api/editor", undefined, "GET");
        assetByCard = createAssetMap(editor.assets ?? []);
        applyPresentation(editor.metadata?.presentation);
        const result = await api("/api/play/start", { locale: requestedLocale });
        if (result.error) throw new Error(result.error.message);
        session = result.sessionId;
        render(result);
        setStatus("Reign started", "ok");
      } catch (error) {
        setStatus(error.message, "err");
      }
    }

    el("start").addEventListener("click", startReign);
    el("restart").addEventListener("click", startReign);

    async function swipe(direction) {
      if (!canSwipe()) return;
      try {
        const result = await api("/api/play/swipe", { sessionId: session, direction });
        render(result);
        if (result.gameOver) setStatus(`Game over: ${result.gameOver.faction}`, "err");
      } catch (error) {
        setStatus(error.message, "err");
      }
    }
    el("left").addEventListener("click", () => swipe("left"));
    el("right").addEventListener("click", () => swipe("right"));

    function setChoiceButtonLabels(card) {
      const left = card.choices?.find((choice) => choice.id === "left");
      const right = card.choices?.find((choice) => choice.id === "right");
      el("left").textContent = `◀ ${left?.label ?? "Left"}`;
      el("right").textContent = `${right?.label ?? "Right"} ▶`;
    }

    function resetChoiceButtonLabels() {
      el("left").textContent = "◀ Left";
      el("right").textContent = "Right ▶";
    }

    function applyPresentation(presentation = {}) {
      const variables = presentation?.css?.variables ?? {};
      for (const [name, value] of Object.entries(variables)) {
        if (name.startsWith("--")) {
          document.documentElement.style.setProperty(name, String(value));
        }
      }

      let style = document.getElementById("presentation-css");
      if (!style) {
        style = document.createElement("style");
        style.id = "presentation-css";
        document.head.appendChild(style);
      }
      style.textContent = presentation?.policy?.allowCssText === true ? (presentation?.css?.text ?? "") : "";
    }

    function createAssetMap(assets) {
      const map = new Map();
      for (const asset of assets) {
        if (asset?.cardId && asset?.uri && !map.has(asset.cardId)) {
          map.set(asset.cardId, asset);
        }
      }
      return map;
    }
  </script>
</body>
</html>
