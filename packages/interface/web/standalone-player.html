<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/logo-alpha.png" />
  <title>ReignsAgent Player</title>
  <style>
    :root {
      --bg: #edf2f7;
      --panel: #ffffff;
      --panel-raised: #f8fafc;
      --ink: #172033;
      --muted: #637087;
      --accent: #3457d5;
      --accent-2: #7444c8;
      --border: #c8d2df;
      --radius: 18px;
      --button-ink: #ffffff;
      --decision-left: #b3475b;
      --decision-right: #207a68;
      --shadow: 0 28px 80px rgba(35, 49, 73, 0.18);
      color-scheme: light;
    }
    :root[data-skin="catppuccin-latte"] {
      --bg: #e6e9ef; --panel: #eff1f5; --panel-raised: #fafafa; --ink: #4c4f69;
      --muted: #6c6f85; --accent: #8839ef; --accent-2: #7287fd; --border: #bcc0cc;
      --decision-left: #d20f39; --decision-right: #179299; --button-ink: #ffffff;
    }
    :root[data-skin="classic"] {
      --bg: #0c0f14; --panel: #171c25; --panel-raised: #202735; --ink: #eee9dc;
      --muted: #9da3ad; --accent: #c9a24b; --accent-2: #6d8fd6; --border: #353d4b;
      --decision-left: #b95a63; --decision-right: #5f9d82; --button-ink: #17120a; color-scheme: dark;
      --shadow: 0 32px 90px rgba(0, 0, 0, 0.52);
    }
    :root[data-skin="arcade"] {
      --bg: #100b19; --panel: #241834; --panel-raised: #332148; --ink: #fff2c9;
      --muted: #c6b8d8; --accent: #ffd34f; --accent-2: #b568ff; --border: #664b86;
      --decision-left: #ff5b81; --decision-right: #4ce6bb; --button-ink: #17111f; color-scheme: dark;
    }
    :root[data-skin="famicom"] {
      --bg: #dfd0b4; --panel: #fff8e8; --panel-raised: #f6ead3; --ink: #211f1c;
      --muted: #6d6256; --accent: #b52222; --accent-2: #275c9a; --border: #24211d;
      --radius: 2px; --decision-left: #b52222; --decision-right: #275c9a; --button-ink: #fff8e8;
      --shadow: 10px 12px 0 rgba(36, 33, 29, 0.22);
    }
    :root[data-skin="phantom"] {
      --bg: #08080a; --panel: #f4f0e8; --panel-raised: #e8e0d3; --ink: #121214;
      --muted: #70695f; --accent: #d71920; --accent-2: #18181b; --border: #d71920;
      --radius: 0; --decision-left: #d71920; --decision-right: #18181b; --button-ink: #f7f2e9;
      --shadow: 12px 12px 0 rgba(215, 25, 32, 0.38); color-scheme: dark;
    }
    :root[data-skin="terminal"] {
      --bg: #050d09; --panel: #0c1710; --panel-raised: #13251a; --ink: #daf8e5;
      --muted: #91b89d; --accent: #68ff95; --accent-2: #78c6ff; --border: #28543a;
      --radius: 4px; --decision-left: #ff7b8d; --decision-right: #68ff95; --button-ink: #06100a;
      --shadow: 0 0 54px rgba(104, 255, 149, 0.11); color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% -12%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 38rem),
        linear-gradient(135deg, color-mix(in srgb, var(--bg) 92%, var(--accent) 8%), var(--bg));
      color: var(--ink);
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image: repeating-linear-gradient(90deg, transparent 0 47px, color-mix(in srgb, var(--ink) 8%, transparent) 48px);
      mask-image: linear-gradient(to bottom, black, transparent 70%);
    }
    button { font: inherit; }
    .player-shell {
      width: min(1180px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0 22px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 20px;
    }
    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 24px;
      padding: 0 4px 18px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 78%, transparent);
    }
    .eyebrow, .utility-label {
      margin: 0 0 5px;
      color: var(--muted);
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .project-title {
      margin: 0;
      max-width: 760px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 500;
      letter-spacing: -0.035em;
      line-height: 0.98;
    }
    .turn-readout { text-align: right; }
    .turn-value {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      line-height: 1;
    }
    .gauges {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .gauge {
      min-width: 0;
      padding: 10px 12px 11px;
      border: 1px solid color-mix(in srgb, var(--border) 82%, transparent);
      background: color-mix(in srgb, var(--panel) 76%, transparent);
      backdrop-filter: blur(12px);
      border-radius: calc(var(--radius) * 0.6);
    }
    .gauge__head { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; }
    .gauge__name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
    .gauge__value { font-family: "Cascadia Mono", Consolas, monospace; font-weight: 700; }
    .gauge__bar { height: 3px; margin-top: 8px; overflow: hidden; background: color-mix(in srgb, var(--border) 70%, transparent); }
    .gauge__fill { height: 100%; background: var(--accent); transition: width 360ms cubic-bezier(.22,.8,.22,1); }
    .gauge__desc { display: none; }
    .decision-stage {
      min-height: 520px;
      display: grid;
      grid-template-columns: minmax(116px, 1fr) minmax(340px, 560px) minmax(116px, 1fr);
      align-items: center;
      gap: clamp(18px, 4vw, 52px);
      perspective: 1400px;
    }
    .choice-rail {
      min-width: 0;
      opacity: 0.62;
      transition: opacity 180ms ease, transform 220ms ease;
    }
    .choice-rail--right { text-align: right; }
    .choice-rail__line { width: 100%; height: 1px; background: var(--border); }
    .choice-rail__key {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .choice-rail__label { margin: 0; font-family: Georgia, serif; font-size: clamp(18px, 2.2vw, 28px); line-height: 1.12; }
    .decision-stage[data-intent="left"] .choice-rail--left,
    .decision-stage[data-intent="right"] .choice-rail--right { opacity: 1; transform: translateX(0); }
    .card-wrap { position: relative; min-width: 0; }
    .card-wrap::before, .card-wrap::after {
      content: "";
      position: absolute;
      inset: 18px -12px -12px;
      z-index: -1;
      border: 1px solid color-mix(in srgb, var(--border) 55%, transparent);
      border-radius: var(--radius);
      transform: rotate(-1.4deg);
    }
    .card-wrap::after { inset: 9px -7px -6px; transform: rotate(1deg); background: color-mix(in srgb, var(--panel) 38%, transparent); }
    .card {
      position: relative;
      min-height: 430px;
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      padding: clamp(26px, 5vw, 50px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(155deg, var(--panel-raised), var(--panel));
      box-shadow: var(--shadow);
      transform: translate3d(0, 0, 0);
      transform-origin: 50% 88%;
      transition: transform 230ms cubic-bezier(.22,.8,.24,1), opacity 190ms ease, box-shadow 180ms ease;
      touch-action: pan-y;
      user-select: none;
      will-change: transform, opacity;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: linear-gradient(90deg, var(--decision-left), var(--accent), var(--decision-right));
    }
    .card.is-dragging { transition: box-shadow 120ms ease; cursor: grabbing; }
    .card.is-exiting-left { transform: translate3d(-125%, 10px, 0) rotate(-13deg); opacity: 0; }
    .card.is-exiting-right { transform: translate3d(125%, 10px, 0) rotate(13deg); opacity: 0; }
    .card.is-entering { animation: card-arrive 360ms cubic-bezier(.16,.9,.22,1) both; }
    @keyframes card-arrive { from { opacity: 0; transform: translate3d(0, -24px, 0) rotateX(3deg) scale(.985); } }
    .card__content { align-self: center; }
    .card__art {
      width: min(176px, 48%);
      aspect-ratio: 1;
      display: block;
      margin: 0 auto 24px;
      object-fit: contain;
      padding: 16px;
      border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
      background: color-mix(in srgb, var(--bg) 45%, transparent);
      border-radius: calc(var(--radius) * 0.72);
    }
    .card__text {
      max-width: 26ch;
      margin: 0 auto;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3.6vw, 38px);
      line-height: 1.18;
      letter-spacing: -0.018em;
    }
    .choice-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 34px; }
    .choice-button {
      min-height: 70px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 0.72);
      background: color-mix(in srgb, var(--panel-raised) 88%, transparent);
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }
    .choice-button--right { grid-template-columns: 1fr auto; text-align: right; }
    .choice-button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 24px color-mix(in srgb, var(--ink) 12%, transparent); }
    .choice-button--left:hover:not(:disabled), .choice-button--left:focus-visible { border-color: var(--decision-left); }
    .choice-button--right:hover:not(:disabled), .choice-button--right:focus-visible { border-color: var(--decision-right); }
    .choice-button:disabled { opacity: 0.42; cursor: default; }
    .choice-button__key {
      width: 32px; height: 32px; display: grid; place-items: center;
      border: 1px solid currentColor; border-radius: 50%; font-family: "Cascadia Mono", Consolas, monospace;
    }
    .choice-button__label { font-size: 14px; font-weight: 650; line-height: 1.2; }
    .player-footer { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; min-height: 42px; }
    .status { min-width: 0; color: var(--muted); font-size: 12px; }
    .status[data-kind="error"] { color: var(--decision-left); }
    .session-label { color: var(--muted); font-family: "Cascadia Mono", Consolas, monospace; font-size: 11px; text-align: right; }
    .restart-button, .load-button {
      border: 1px solid var(--border); border-radius: 999px; background: transparent; color: var(--ink);
      padding: 9px 16px; cursor: pointer; font-size: 12px; font-weight: 650;
      transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
    }
    .restart-button:hover, .load-button:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 9%, transparent); transform: translateY(-1px); }
    button:focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 72%, transparent); outline-offset: 3px; }
    .summary { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); text-align: center; }
    .summary__title { margin: 0 0 7px; font-family: Georgia, serif; font-size: 22px; }
    .summary__line { display: inline-block; margin: 2px 7px; color: var(--muted); font-size: 12px; }
    [hidden] { display: none !important; }
    @media (max-width: 820px) {
      .player-shell { width: min(640px, calc(100% - 24px)); padding-top: 18px; }
      .masthead { align-items: center; }
      .gauges { grid-template-columns: repeat(2, 1fr); }
      .decision-stage { grid-template-columns: minmax(0, 1fr); min-height: 0; }
      .choice-rail { display: none; }
      .card { min-height: 420px; }
    }
    @media (max-height: 820px) and (min-width: 821px) {
      .player-shell { padding: 14px 0 12px; gap: 10px; }
      .masthead { padding-bottom: 10px; }
      .project-title { font-size: clamp(28px, 3.4vw, 40px); }
      .turn-value { font-size: 25px; }
      .gauge { padding: 7px 10px 8px; }
      .decision-stage { min-height: 420px; }
      .card { min-height: 350px; padding: 24px 34px; }
      .card__art { width: min(120px, 34%); padding: 10px; margin-bottom: 14px; }
      .card__text { font-size: clamp(22px, 2.6vw, 31px); }
      .choice-actions { margin-top: 20px; }
      .choice-button { min-height: 58px; padding: 9px 12px; }
    }
    @media (max-height: 600px) and (min-width: 821px) {
      .player-shell { padding: 10px 0 8px; gap: 7px; }
      .masthead { padding-bottom: 7px; }
      .eyebrow, .utility-label { margin-bottom: 2px; font-size: 9px; }
      .project-title { font-size: 28px; }
      .turn-value { font-size: 21px; }
      .gauge { padding: 5px 8px 6px; }
      .gauge__bar { margin-top: 5px; }
      .decision-stage { min-height: 310px; }
      .card { min-height: 280px; padding: 17px 24px; }
      .card__art { width: min(82px, 28%); padding: 7px; margin-bottom: 9px; }
      .card__text { font-size: 23px; }
      .choice-actions { margin-top: 13px; }
      .choice-button { min-height: 48px; padding: 7px 10px; }
      .choice-button__key { width: 28px; height: 28px; }
      .player-footer { min-height: 34px; }
      .restart-button, .load-button { padding: 7px 14px; }
    }
    @media (max-width: 500px) {
      .masthead { grid-template-columns: minmax(0, 1fr); gap: 12px; }
      .turn-readout { display: flex; align-items: baseline; justify-content: space-between; text-align: left; }
      .project-title { white-space: normal; }
      .card { min-height: 390px; padding: 24px 20px; }
      .choice-actions { grid-template-columns: 1fr; }
      .choice-button--right { grid-template-columns: auto 1fr; text-align: left; }
      .choice-button--right .choice-button__key { grid-column: 1; grid-row: 1; }
      .choice-button--right .choice-button__label { grid-column: 2; }
      .player-footer { grid-template-columns: 1fr auto; }
      .session-label { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: 1ms !important; transition-duration: 1ms !important; }
    }
  </style>
</head>
<body>
  <div class="player-shell">
    <header class="masthead">
      <div>
        <p class="eyebrow" id="release-label">A playable court</p>
        <h1 class="project-title" id="project-title">Awaiting a court</h1>
      </div>
      <div class="turn-readout">
        <p class="utility-label">Decision</p>
        <span class="turn-value" id="turn-label">00</span>
      </div>
    </header>

    <section class="gauges" id="gauges" aria-label="Court gauges"></section>

    <main class="decision-stage" id="decision-stage">
      <aside class="choice-rail choice-rail--left" aria-hidden="true">
        <div class="choice-rail__line"></div>
        <span class="choice-rail__key">Left decree</span>
        <p class="choice-rail__label" id="left-rail-label">Left</p>
      </aside>

      <div class="card-wrap">
        <article class="card" id="card" role="group" aria-label="Current card">
          <div class="card__content">
            <img id="art" class="card__art" alt="" hidden />
            <p class="card__text" id="text" aria-live="polite">Open a build to begin.</p>
            <div class="summary" id="summary" hidden aria-live="polite"></div>
          </div>
          <div class="choice-actions">
            <button type="button" id="left" class="choice-button choice-button--left" disabled aria-label="Choose left">
              <span class="choice-button__key" aria-hidden="true">←</span>
              <span class="choice-button__label" id="left-label">Left</span>
            </button>
            <button type="button" id="right" class="choice-button choice-button--right" disabled aria-label="Choose right">
              <span class="choice-button__label" id="right-label">Right</span>
              <span class="choice-button__key" aria-hidden="true">→</span>
            </button>
          </div>
        </article>
      </div>

      <aside class="choice-rail choice-rail--right" aria-hidden="true">
        <div class="choice-rail__line"></div>
        <span class="choice-rail__key">Right decree</span>
        <p class="choice-rail__label" id="right-rail-label">Right</p>
      </aside>
    </main>

    <footer class="player-footer">
      <div class="status" id="status" role="status" aria-live="polite">Preparing the court…</div>
      <div>
        <input type="file" id="file" accept=".json,application/json" hidden />
        <button type="button" class="load-button" id="load">Open build</button>
        <button type="button" class="restart-button" id="restart" hidden>Restart reign</button>
      </div>
      <div class="session-label" id="session-label">Offline player</div>
    </footer>
  </div>

  <script type="module">
    import { createPlayer } from "./player-runtime.js";

    const el = (id) => document.getElementById(id);
    const params = new URLSearchParams(window.location.search);
    const requestedLocale = params.get("locale") || navigator.language || "en";
    const embeddedBuildPath = params.get("build");
    const DEFAULT_SKIN = "github-light";
    const KNOWN_SKINS = new Set(["github-light", "catppuccin-latte", "classic", "famicom", "phantom", "arcade", "terminal"]);
    const SKIN_ALIASES = { workbench: "classic" };
    const requestedSkin = SKIN_ALIASES[params.get("skin")] ?? params.get("skin");
    const reducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches ?? false;

    document.documentElement.dataset.skin = KNOWN_SKINS.has(requestedSkin) ? requestedSkin : DEFAULT_SKIN;

    let buildData = null;
    let player = null;
    let lastSnap = null;
    let assetByCard = new Map();
    let presentation = {};
    let isTransitioning = false;
    let motionToken = 0;

    function setStatus(message, kind = "") {
      el("status").textContent = message;
      el("status").dataset.kind = kind;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (character) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      })[character]);
    }

    function canChoose() {
      return Boolean(player && lastSnap?.currentCard && !lastSnap?.gameOver && !isTransitioning);
    }

    function syncControls() {
      const enabled = canChoose();
      el("left").disabled = !enabled;
      el("right").disabled = !enabled;
      el("restart").hidden = !buildData;
      el("load").hidden = Boolean(embeddedBuildPath || buildData);
    }

    function choiceFor(card, direction) {
      return card?.choices?.find((choice) => choice.id === direction);
    }

    function updateChoiceLabels(card) {
      const left = choiceFor(card, "left")?.label ?? "Left";
      const right = choiceFor(card, "right")?.label ?? "Right";
      el("left-label").textContent = left;
      el("right-label").textContent = right;
      el("left-rail-label").textContent = left;
      el("right-rail-label").textContent = right;
      el("left").setAttribute("aria-label", `Choose left: ${left}`);
      el("right").setAttribute("aria-label", `Choose right: ${right}`);
    }

    function render(snapshot, { animate = false } = {}) {
      lastSnap = snapshot;
      el("turn-label").textContent = String(snapshot?.turn ?? 0).padStart(2, "0");
      renderGauges(snapshot?.factions ?? {});
      const card = snapshot?.currentCard;
      if (card) {
        const asset = assetByCard.get(card.id);
        if (asset) {
          el("art").src = asset.uri;
          el("art").alt = asset.title || "Card illustration";
          el("art").hidden = false;
        } else {
          el("art").removeAttribute("src");
          el("art").hidden = true;
        }
        el("text").textContent = card.text ?? card.id;
        updateChoiceLabels(card);
        el("summary").hidden = true;
      } else {
        el("art").removeAttribute("src");
        el("art").hidden = true;
        el("text").textContent = snapshot?.gameOver ? "The reign has reached its end." : "No decree is available.";
        updateChoiceLabels(null);
        if (snapshot?.gameOver) renderSummary(snapshot);
      }
      syncControls();
      if (animate && !reducedMotion) {
        el("card").classList.remove("is-entering");
        void el("card").offsetWidth;
        el("card").classList.add("is-entering");
        window.setTimeout(() => el("card").classList.remove("is-entering"), 380);
      }
    }

    function renderGauges(factions) {
      const gauges = el("gauges");
      gauges.innerHTML = "";
      for (const [name, gauge] of Object.entries(projectGauges(factions, presentation))) {
        const node = document.createElement("div");
        node.className = "gauge";
        node.innerHTML = `<div class="gauge__head"><span class="gauge__name">${escapeHtml(gauge.label || name)}</span><span class="gauge__value">${gauge.value}</span></div><div class="gauge__bar"><div class="gauge__fill" style="width:${gauge.value}%"></div></div>`;
        gauges.appendChild(node);
      }
    }

    function renderSummary(snapshot) {
      const summary = el("summary");
      const lines = Object.entries(snapshot.factions ?? {})
        .map(([name, value]) => `<span class="summary__line">${escapeHtml(name)} ${value}</span>`)
        .join("");
      summary.innerHTML = `<p class="summary__title">Reign concluded</p><div>Decisions: ${snapshot.turn ?? 0}</div><div>${lines}</div>`;
      summary.hidden = false;
    }

    async function choose(direction) {
      if (!canChoose()) return;
      isTransitioning = true;
      const token = ++motionToken;
      syncControls();
      const card = el("card");
      card.style.transform = "";
      card.classList.remove("is-dragging");
      card.classList.add(`is-exiting-${direction}`);
      el("decision-stage").dataset.intent = direction;
      await waitForMotion(220);
      if (token !== motionToken) return;
      try {
        const snapshot = player.swipe(direction);
        card.classList.remove("is-exiting-left", "is-exiting-right");
        el("decision-stage").removeAttribute("data-intent");
        isTransitioning = false;
        render(snapshot, { animate: true });
        setStatus(snapshot.gameOver ? "This reign is complete. Restart when ready." : "Decision recorded.");
      } catch (error) {
        card.classList.remove("is-exiting-left", "is-exiting-right");
        el("decision-stage").removeAttribute("data-intent");
        isTransitioning = false;
        syncControls();
        setStatus(error.message, "error");
      }
    }

    function restartReign() {
      if (!buildData) return;
      motionToken += 1;
      isTransitioning = false;
      el("card").classList.remove("is-exiting-left", "is-exiting-right", "is-dragging");
      el("card").style.transform = "";
      el("decision-stage").removeAttribute("data-intent");
      try {
        player = createPlayer(buildData, { locale: requestedLocale });
        render(player.start(), { animate: true });
        setStatus("A new reign begins.");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    function startBuild(build) {
      buildData = build;
      assetByCard = createAssetMap(build.content?.assets ?? []);
      presentation = build.presentation ?? build.content?.metadata?.presentation ?? {};
      applyPresentation(presentation);
      const title = build.title || build.content?.metadata?.title || "Untitled court";
      const version = build.version || build.content?.metadata?.version || "";
      document.title = `${title} — Player`;
      el("project-title").textContent = title;
      el("release-label").textContent = version ? `Playable release · ${version}` : "Playable release";
      el("session-label").textContent = build.buildId ? `Build ${build.buildId}` : "Offline player";
      restartReign();
    }

    async function loadEmbeddedBuild() {
      if (!embeddedBuildPath) {
        setStatus("Open a game build to begin.");
        return;
      }
      el("load").hidden = true;
      try {
        const url = new URL(embeddedBuildPath, window.location.href);
        if (url.origin !== window.location.origin) throw new Error("Embedded build must use the player origin");
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error(`Embedded build failed to load (${response.status})`);
        startBuild(await response.json());
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    function projectGauges(factions, presentationConfig = {}) {
      const config = presentationConfig?.gauges ?? {};
      const result = {};
      for (const name of ["gauge0", "gauge1", "gauge2", "gauge3"]) {
        const gaugeConfig = config[name] ?? {};
        if (gaugeConfig.visible === false || gaugeConfig.hidden === true) continue;
        const value = Math.max(0, Math.min(100, Number.isFinite(factions[name]) ? factions[name] : 50));
        result[name] = {
          label: typeof gaugeConfig.label === "string" && gaugeConfig.label.trim() ? gaugeConfig.label.trim() : null,
          value
        };
      }
      return result;
    }

    function applyPresentation(presentationConfig = {}) {
      const blockedVariables = new Set(["--bg", "--panel", "--ink", "--muted", "--accent", "--accent-2", "--border", "--radius"]);
      for (const [name, value] of Object.entries(presentationConfig?.css?.variables ?? {})) {
        if (name.startsWith("--") && !blockedVariables.has(name)) document.documentElement.style.setProperty(name, String(value));
      }
      let style = document.getElementById("presentation-css");
      if (!style) {
        style = document.createElement("style");
        style.id = "presentation-css";
        document.head.appendChild(style);
      }
      style.textContent = presentationConfig?.policy?.allowCssText === true ? (presentationConfig?.css?.text ?? "") : "";
    }

    function createAssetMap(assets) {
      const map = new Map();
      for (const asset of assets) if (asset?.cardId && asset?.uri && !map.has(asset.cardId)) map.set(asset.cardId, asset);
      return map;
    }

    function waitForMotion(milliseconds) {
      return reducedMotion ? Promise.resolve() : new Promise((resolve) => window.setTimeout(resolve, milliseconds));
    }

    function attachCardInput() {
      const card = el("card");
      let pointerId = null;
      let startX = 0;
      let currentX = 0;
      const threshold = 0.24;

      card.addEventListener("pointerdown", (event) => {
        if (event.target.closest("button, input, a, select, textarea")) return;
        if (!canChoose() || (event.pointerType === "mouse" && event.button !== 0)) return;
        pointerId = event.pointerId;
        startX = currentX = event.clientX;
        card.setPointerCapture?.(pointerId);
        card.classList.add("is-dragging");
      });
      card.addEventListener("pointermove", (event) => {
        if (pointerId !== event.pointerId) return;
        currentX = event.clientX;
        const width = card.offsetWidth || 1;
        const delta = Math.max(-width, Math.min(width, currentX - startX));
        const fraction = delta / width;
        card.style.transform = reducedMotion ? "" : `translate3d(${delta}px, 0, 0) rotate(${fraction * 9}deg)`;
        const intent = fraction <= -threshold ? "left" : fraction >= threshold ? "right" : "";
        if (intent) el("decision-stage").dataset.intent = intent;
        else el("decision-stage").removeAttribute("data-intent");
      });
      const finish = (event) => {
        if (pointerId !== event.pointerId) return;
        const fraction = (currentX - startX) / (card.offsetWidth || 1);
        pointerId = null;
        card.style.transform = "";
        card.classList.remove("is-dragging");
        el("decision-stage").removeAttribute("data-intent");
        if (Math.abs(fraction) >= threshold) void choose(fraction < 0 ? "left" : "right");
      };
      card.addEventListener("pointerup", finish);
      card.addEventListener("pointercancel", finish);
    }

    el("left").addEventListener("click", () => void choose("left"));
    el("right").addEventListener("click", () => void choose("right"));
    el("restart").addEventListener("click", restartReign);
    el("load").addEventListener("click", () => el("file").click());
    el("file").addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try { startBuild(JSON.parse(await file.text())); }
      catch (error) { setStatus(error.message, "error"); }
    });
    window.addEventListener("keydown", (event) => {
      if (event.repeat || !canChoose()) return;
      if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") {
        event.preventDefault(); void choose("left");
      } else if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") {
        event.preventDefault(); void choose("right");
      }
    });

    attachCardInput();
    syncControls();
    void loadEmbeddedBuild();
  </script>
</body>
</html>
