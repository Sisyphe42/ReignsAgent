<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>ReignsAgent Player</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --ink: #24292f;
      --muted: #57606a;
      --accent: #0969da;
      --accent-2: #8250df;
      --border: #d0d7de;
      --radius: 6px;
      --button-ink: #ffffff;
      color-scheme: light;
    }
    :root[data-skin="catppuccin-latte"] {
      --bg: #eff1f5;
      --panel: #fafafa;
      --ink: #4c4f69;
      --muted: #6c6f85;
      --accent: #8839ef;
      --accent-2: #ea76cb;
      --border: #ccd0da;
      --radius: 8px;
      --button-ink: #ffffff;
      color-scheme: light;
    }
    :root[data-skin="classic"] {
      --bg: #0f1115;
      --panel: #1f232c;
      --ink: #e8e6e1;
      --muted: #8a8f99;
      --accent: #c9a24b;
      --accent-2: #6d8fd6;
      --border: #2a2f3a;
      --radius: 8px;
      --button-ink: #1a1405;
    }
    :root[data-skin="arcade"] {
      --bg: #15111c;
      --panel: #302442;
      --ink: #fff2c9;
      --muted: #c6b8d8;
      --accent: #ffd34f;
      --accent-2: #6fe6c4;
      --border: #654f83;
      --radius: 4px;
      --button-ink: #17111f;
    }
    :root[data-skin="famicom"] {
      --bg: #efe4cc;
      --panel: #fff8e8;
      --ink: #211f1c;
      --muted: #6d6256;
      --accent: #b52222;
      --accent-2: #275c9a;
      --border: #24211d;
      --radius: 0px;
      --button-ink: #fff8e8;
      color-scheme: light;
    }
    :root[data-skin="phantom"] {
      --bg: #09090a;
      --panel: #f4f0e8;
      --ink: #f7f2e9;
      --muted: #c8c1b5;
      --accent: #d71920;
      --accent-2: #f4f0e8;
      --border: #f7f2e9;
      --radius: 0px;
      --button-ink: #f7f2e9;
    }
    :root[data-skin="terminal"] {
      --bg: #07100c;
      --panel: #12231a;
      --ink: #daf8e5;
      --muted: #91b89d;
      --accent: #68ff95;
      --accent-2: #78c6ff;
      --border: #28543a;
      --radius: 2px;
      --button-ink: #06100a;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .stage { width: 100%; max-width: 440px; }
    .gauges { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .gauge { background: var(--panel); border-radius: 6px; padding: 8px; border: 1px solid var(--border); }
    .gauge__name { font-size: 11px; color: var(--muted); text-transform: capitalize; }
    .gauge__desc { margin-top: 2px; font-size: 10px; color: var(--muted); line-height: 1.35; }
    .gauge__bar { height: 6px; background: rgba(0, 0, 0, 0.26); border-radius: 3px; overflow: hidden; margin-top: 4px; }
    .gauge__fill { height: 100%; background: var(--accent-2); }
    .card {
      background: linear-gradient(160deg, color-mix(in srgb, var(--panel) 84%, white 8%), color-mix(in srgb, var(--panel) 92%, black 8%));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }
    :root[data-skin="phantom"] .card {
      background: linear-gradient(160deg, #f4f0e8, #e7ded0);
      color: #09090a;
      border-width: 2px;
      box-shadow: 8px 8px 0 rgba(215, 25, 32, 0.18);
    }
    .art {
      width: min(160px, 48%);
      aspect-ratio: 1;
      align-self: center;
      object-fit: contain;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 18px;
    }
    .text { font-size: 19px; line-height: 1.5; }
    .swipes { display: flex; gap: 12px; margin-top: 24px; }
    .start-wrap { text-align: center; margin-top: 24px; display: flex; gap: 10px; justify-content: center; }
    .session-meta { display: flex; justify-content: space-between; gap: 12px; margin-top: 10px; color: var(--muted); font-size: 12px; }
    .swipe-hint { font-size: 11px; color: #8a8f99; text-align: center; margin: 12px 0 0; }
    .summary { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 16px; }
    .summary__title { font-size: 14px; font-weight: 600; margin: 0 0 6px; }
    .summary__line { font-size: 12px; color: var(--muted); margin: 2px 0; }
    .card { transition: transform 0.18s ease-out; touch-action: pan-y; user-select: none; }
    .card.swiping { transition: none; cursor: grabbing; }
    .card[data-swipe-hint="left"] { box-shadow: -6px 12px 30px rgba(217,106,106,0.35); }
    .card[data-swipe-hint="right"] { box-shadow: 6px 12px 30px rgba(106,217,143,0.35); }
    @media (prefers-reduced-motion: reduce) { .card { transition: none; } }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    button {
      flex: 1;
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }
    button:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,0.16); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .primary { background: var(--accent); color: var(--button-ink); font-weight: 600; border-color: var(--accent); }
    .status { margin-top: 16px; font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="gauges" id="gauges"></div>
    <div class="card" id="card" role="group" aria-label="Current card">
      <img id="art" class="art" alt="" hidden />
      <div class="text" id="text" aria-live="polite">No build loaded.</div>
      <div class="swipes">
        <button id="left" disabled aria-label="Swipe left">◀ Left</button>
        <button id="right" disabled aria-label="Swipe right">Right ▶</button>
      </div>
      <div class="swipe-hint" id="swipe-hint" hidden>Drag the card or use ← → keys</div>
    </div>
    <div class="summary" id="summary" hidden aria-live="polite"></div>
    <div class="start-wrap">
      <input type="file" id="file" accept=".json,application/json" hidden />
      <button class="primary" id="load">Load build</button>
      <button id="restart" hidden>Restart reign</button>
    </div>
    <div class="session-meta">
      <span id="turn-label">Turn 0</span>
      <span id="session-label">No build loaded</span>
    </div>
    <div class="status" id="status" role="status" aria-live="polite"></div>
  </div>

  <script type="module">
    import { createPlayer } from "./player-runtime.js";

    const el = (id) => document.getElementById(id);
    const setStatus = (msg) => { el("status").textContent = msg; };
    const escapeHtml = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const params = new URLSearchParams(window.location.search);
    const requestedLocale = params.get("locale") || navigator.language || "en";
    const requestedSkin = params.get("skin");
    const DEFAULT_SKIN = "github-light";
    const KNOWN_SKINS = new Set(["github-light", "catppuccin-latte", "classic", "famicom", "phantom", "arcade", "terminal"]);
    const SKIN_ALIASES = { workbench: "classic" };
    const requestedSkinId = SKIN_ALIASES[requestedSkin] ?? requestedSkin;
    const skin = KNOWN_SKINS.has(requestedSkinId) ? requestedSkinId : DEFAULT_SKIN;
    document.documentElement.dataset.skin = skin;
    params.set("skin", skin);
    window.history.replaceState(null, "", `${window.location.pathname}?${params.toString()}${window.location.hash}`);

    let player = null;
    let assetByCard = new Map();
    let lastSnap = null;
    let presentation = {};
    let awaitingRestartConfirm = false;

    // attachSwipe is inlined here (mirroring packages/interface/web/assets/swipe-input.js)
    // so the deployed player.html needs no repo-relative imports.
    function attachSwipe(options) {
      const element = options.element;
      const onSwipe = options.onSwipe;
      const canSwipe = typeof options.canSwipe === "function" ? options.canSwipe : () => true;
      const reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const THRESHOLD = 0.28;
      const MAX_TILT = 14;
      let dragging = false, startX = 0, currentX = 0, pointerId = null;

      const onKey = (event) => {
        if (!canSwipe()) return;
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") { event.preventDefault(); onSwipe("left"); }
        else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") { event.preventDefault(); onSwipe("right"); }
      };
      const onDown = (event) => {
        if (!canSwipe() || dragging) return;
        if (event.pointerType === "mouse" && event.button !== 0) return;
        dragging = true; pointerId = event.pointerId; startX = currentX = event.clientX;
        try { element.setPointerCapture?.(event.pointerId); } catch {}
        element.classList.add("swiping");
      };
      const onMove = (event) => {
        if (!dragging || event.pointerId !== pointerId) return;
        currentX = event.clientX;
        if (reducedMotion) return;
        const width = element.offsetWidth || 1;
        const delta = Math.max(-width, Math.min(width, currentX - startX));
        const fraction = delta / width;
        element.style.transform = `translateX(${delta}px) rotate(${fraction * MAX_TILT}deg)`;
        element.dataset.swipeHint = fraction <= -THRESHOLD ? "left" : fraction >= THRESHOLD ? "right" : "";
      };
      const finish = () => {
        const width = element.offsetWidth || 1;
        const fraction = (currentX - startX) / width;
        dragging = false; pointerId = null;
        element.style.transform = ""; delete element.dataset.swipeHint;
        element.classList.remove("swiping");
        if (Math.abs(fraction) >= THRESHOLD && canSwipe()) onSwipe(fraction < 0 ? "left" : "right");
      };
      const onTouchStart = (event) => {
        if (!canSwipe() || dragging || event.touches.length !== 1) return;
        dragging = true; startX = currentX = event.touches[0].clientX;
        element.classList.add("swiping");
      };
      const onMoveTouch = (event) => {
        if (!dragging || event.touches.length !== 1) return;
        currentX = event.touches[0].clientX;
        if (reducedMotion) return;
        const width = element.offsetWidth || 1;
        const delta = Math.max(-width, Math.min(width, currentX - startX));
        const fraction = delta / width;
        element.style.transform = `translateX(${delta}px) rotate(${fraction * MAX_TILT}deg)`;
        element.dataset.swipeHint = fraction <= -THRESHOLD ? "left" : fraction >= THRESHOLD ? "right" : "";
      };

      window.addEventListener("keydown", onKey);
      element.addEventListener("pointerdown", onDown);
      element.addEventListener("pointermove", onMove);
      element.addEventListener("pointerup", finish);
      element.addEventListener("pointercancel", finish);
      element.addEventListener("touchstart", onTouchStart, { passive: true });
      element.addEventListener("touchmove", onMoveTouch, { passive: true });
      element.addEventListener("touchend", finish);
    }

    function canSwipe() {
      return Boolean(player) && !lastSnap?.gameOver && lastSnap?.currentCard;
    }

    // Inlined swipe input (no import) so the shipped player.html stays
    // self-contained — same principle as the inlined core runtime.
    attachSwipe({
      element: el("card"),
      onSwipe: (direction) => swipe(direction),
      canSwipe
    });

    el("load").addEventListener("click", () => el("file").click());
    el("file").addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const build = JSON.parse(await file.text());
        assetByCard = createAssetMap(build.content?.assets ?? []);
        presentation = build.presentation ?? {};
        applyPresentation(build.presentation);
        player = createPlayer(build, { locale: requestedLocale });
        player.on(render);
        const snap = player.start();
        render(snap);
        setStatus("Reign started");
      } catch (error) {
        setStatus(error.message);
      }
    });

    el("restart").addEventListener("click", () => {
      if (!player) return;
      if (!awaitingRestartConfirm) {
        awaitingRestartConfirm = true;
        updateActionButtons(lastSnap);
        setStatus("Click restart again to confirm");
        return;
      }
      try {
        const snap = player.start();
        awaitingRestartConfirm = false;
        render(snap);
        setStatus("Reign restarted");
      } catch (error) {
        setStatus(error.message);
      }
    });

    el("left").addEventListener("click", () => swipe("left"));
    el("right").addEventListener("click", () => swipe("right"));

    function swipe(direction) {
      if (!canSwipe()) return;
      try {
        const snap = player.swipe(direction);
        render(snap);
        if (snap.gameOver) setStatus(`Reign ended: ${snap.gameOver.faction}`);
      } catch (error) {
        setStatus(error.message);
      }
    }

    function updateSessionMeta(snap) {
      const turn = snap?.turn ?? 0;
      el("turn-label").textContent = `Turn ${turn}`;
      el("session-label").textContent = player ? "Build loaded" : "No build loaded";
    }

    function updateActionButtons(snap) {
      el("restart").hidden = !player;
      el("restart").textContent = awaitingRestartConfirm ? "Confirm restart" : "Restart reign";
      el("load").textContent = player && !snap?.gameOver ? "Build loaded" : "Load build";
      el("load").disabled = Boolean(player) && !snap?.gameOver;
    }

    function render(snap) {
      lastSnap = snap;
      updateSessionMeta(snap);
      updateActionButtons(snap);
      const gauges = el("gauges");
      gauges.innerHTML = "";
      const factions = snap?.factions ?? {};
      for (const [name, gauge] of Object.entries(projectGauges(factions, presentation))) {
        const div = document.createElement("div");
        div.className = "gauge";
        const description = gauge.description ? `<div class="gauge__desc">${escapeHtml(gauge.description)}</div>` : "";
        div.innerHTML = `<div class="gauge__name">${escapeHtml(gauge.label || name)} · ${gauge.value}</div>${description}<div class="gauge__bar"><div class="gauge__fill" style="width:${gauge.left}%"></div></div>`;
        gauges.appendChild(div);
      }
      el("swipe-hint").hidden = !snap?.currentCard || snap?.gameOver;
      const card = snap?.currentCard;
      if (card) {
        const asset = assetByCard.get(card.id);
        if (asset) {
          el("art").src = asset.uri;
          el("art").hidden = false;
        } else {
          el("art").removeAttribute("src");
          el("art").hidden = true;
        }
        el("text").textContent = card.text ?? card.id;
        setChoiceButtonLabels(card);
        el("left").disabled = false;
        el("right").disabled = false;
        el("summary").hidden = true;
      } else {
        el("art").removeAttribute("src");
        el("art").hidden = true;
        el("text").textContent = snap?.gameOver ? "Your reign has ended." : "No card available.";
        resetChoiceButtonLabels();
        el("left").disabled = true;
        el("right").disabled = true;
        if (snap?.gameOver) {
          renderSummary(snap);
        }
      }
    }

    function renderSummary(snap) {
      const summary = el("summary");
      const faction = snap.gameOver?.faction ?? "—";
      const lines = Object.entries(snap.factions ?? {})
        .map(([name, value]) => `<div class="summary__line">${escapeHtml(name)}: ${value}</div>`)
        .join("");
      summary.innerHTML = `
        <p class="summary__title">Reign ended · ${escapeHtml(faction)}</p>
        <div class="summary__line">Turns survived: ${snap.turn ?? 0}</div>
        ${lines}
      `;
      summary.hidden = false;
    }

    function setChoiceButtonLabels(card) {
      const left = card.choices?.find((choice) => choice.id === "left");
      const right = card.choices?.find((choice) => choice.id === "right");
      el("left").textContent = `◀ ${left?.label ?? "Left"}`;
      el("right").textContent = `${right?.label ?? "Right"} ▶`;
    }

    function resetChoiceButtonLabels() {
      el("left").textContent = "◀ Left";
      el("right").textContent = "Right ▶";
    }

    function projectGauges(factions, presentationConfig = {}) {
      const config = presentationConfig?.gauges ?? {};
      const result = {};
      for (const name of ["gauge0", "gauge1", "gauge2", "gauge3"]) {
        const gaugeConfig = config[name] ?? {};
        if (gaugeConfig.visible === false || gaugeConfig.hidden === true) continue;
        const value = Math.max(0, Math.min(100, Number.isFinite(factions[name]) ? factions[name] : 50));
        result[name] = {
          label: typeof gaugeConfig.label === "string" && gaugeConfig.label.trim() ? gaugeConfig.label.trim() : null,
          description: typeof gaugeConfig.description === "string" && gaugeConfig.description.trim() ? gaugeConfig.description.trim() : null,
          value,
          left: value,
          right: 100 - value
        };
      }
      return result;
    }

    function applyPresentation(presentation = {}) {
      const variables = presentation?.css?.variables ?? {};
      const blockedVariables = new Set([
        "--bg",
        "--panel",
        "--ink",
        "--muted",
        "--accent",
        "--accent-2",
        "--border",
        "--radius"
      ]);
      for (const [name, value] of Object.entries(variables)) {
        if (name.startsWith("--") && !blockedVariables.has(name)) {
          document.documentElement.style.setProperty(name, String(value));
        }
      }

      let style = document.getElementById("presentation-css");
      if (!style) {
        style = document.createElement("style");
        style.id = "presentation-css";
        document.head.appendChild(style);
      }
      style.textContent = presentation?.policy?.allowCssText === true ? (presentation?.css?.text ?? "") : "";
    }

    function createAssetMap(assets) {
      const map = new Map();
      for (const asset of assets) {
        if (asset?.cardId && asset?.uri && !map.has(asset.cardId)) {
          map.set(asset.cardId, asset);
        }
      }
      return map;
    }

    updateSessionMeta(null);
    updateActionButtons(null);
  </script>
</body>
</html>
