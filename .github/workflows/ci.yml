name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run verify

  deployable-player-smoke:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:game -- fixtures/content/oss-court.cards.json "$RUNNER_TEMP/reigns-agent-player"
      - name: Verify deployable player output
        shell: bash
        run: |
          set -euo pipefail
          test -f "$RUNNER_TEMP/reigns-agent-player/player.html"
          test -f "$RUNNER_TEMP/reigns-agent-player/player-runtime.js"
          test -f "$RUNNER_TEMP/reigns-agent-player/assets/logo-alpha.png"
          find "$RUNNER_TEMP/reigns-agent-player" -maxdepth 1 -name "*.game.json" -print -quit | grep -q .

  hosted-creator-smoke:
    runs-on: ubuntu-latest
    needs: verify
    env:
      REIGNS_AGENT_BASE_PATH: /reignsagent/
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build:hosted
      - run: npm run test:hosted
      - name: Verify scoped PWA output
        shell: bash
        run: |
          set -euo pipefail
          root=apps/creator-web/dist-hosted
          test -f "$root/index.html"
          test -f "$root/manifest.webmanifest"
          test -f "$root/sw.js"
          grep -q '"scope": "/reignsagent/"' "$root/manifest.webmanifest"
          grep -q '/reignsagent/index.html' "$root/sw.js"
          ! grep -R -E 'apiKey|credentials' "$root/sw.js" "$root/manifest.webmanifest"

  desktop-smoke:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npm ci
      - run: npm run build:dashboard
      - run: xvfb-run -a npm run test:desktop:ci
