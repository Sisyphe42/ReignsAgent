name: Desktop Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-node:
    name: Cross-platform Node Creator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:release
      - run: npm run verify:release-artifacts
      - uses: actions/upload-artifact@v7
        with:
          name: ReignsAgent-node
          path: dist/reigns-agent-*.zip
          if-no-files-found: error

  make-desktop:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: win32
            arch: x64
            artifact: ReignsAgent-windows-x64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
            artifact: ReignsAgent-macos-x64
          - runner: macos-15
            platform: darwin
            arch: arm64
            artifact: ReignsAgent-macos-arm64
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            artifact: ReignsAgent-linux-x64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npm ci
      - run: npm run verify:release-metadata
      - run: npm run build:dashboard
      - run: npm run desktop:prepare
      - name: Smoke test Windows project player
        if: matrix.platform == 'win32'
        run: npm run test:player:windows
      - name: Smoke test Electron host on Linux
        if: matrix.platform == 'linux'
        run: xvfb-run -a npm exec -- electron apps/desktop-electron --smoke-test --no-sandbox
      - name: Smoke test Electron host
        if: matrix.platform != 'linux'
        run: npm exec -- electron apps/desktop-electron --smoke-test
      - run: npm run package -w @reigns-agent/desktop-electron -- --arch=${{ matrix.arch }}
      - run: node scripts/build-portable-desktop.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
      - name: Smoke test packaged desktop runtime
        if: matrix.platform != 'linux'
        run: npm run test:desktop:packaged -- ${{ matrix.platform }} ${{ matrix.arch }} apps/desktop-electron/out/make
      - name: Smoke test packaged desktop runtime on Linux
        if: matrix.platform == 'linux'
        run: xvfb-run -a npm run test:desktop:packaged -- ${{ matrix.platform }} ${{ matrix.arch }} apps/desktop-electron/out/make
      - run: node scripts/verify-desktop-artifacts.mjs --platform ${{ matrix.platform }} --root apps/desktop-electron/out/make
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop-electron/out/make/zip/${{ matrix.platform }}/${{ matrix.arch }}/ReignsAgent-${{ matrix.platform }}-${{ matrix.arch }}-*.zip
          if-no-files-found: error

  assemble-release:
    name: Verify complete release asset set
    needs: [build-node, make-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          pattern: ReignsAgent-*
          path: downloaded-assets
          merge-multiple: true
      - run: node scripts/assemble-release.mjs --input downloaded-assets --output release-assets
      - uses: actions/upload-artifact@v7
        with:
          name: ReignsAgent-release-assets
          path: |
            release-assets/*.zip
            release-assets/SHA256SUMS.txt
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: assemble-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: ReignsAgent-release-assets
          path: release-assets
      - run: node scripts/verify-release-metadata.mjs --tag "${{ github.ref_name }}"
      - run: node scripts/assemble-release.mjs --input release-assets --output verified-assets --tag "${{ github.ref_name }}"
      - name: Refuse to replace an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; refusing to replace its assets." >&2
            exit 1
          fi
      - name: Publish verified assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" verified-assets/* --verify-tag --title "ReignsAgent ${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
